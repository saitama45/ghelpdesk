name: Deploy Laravel to Azure App Service

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: fileinfo, mbstring, xml, gd, zip, pdo_sqlsrv, sqlsrv
          ini-values: post_max_size=256M, max_execution_time=180

      - name: Install Composer Dependencies
        run: composer install --optimize-autoloader

      - name: Install NPM Dependencies & Build
        run: |
          if [ -f "package.json" ]; then
            npm install
            npm run build
          fi

      - name: Create Storage Link
        run: php artisan storage:link

      - name: Prepare Deployment Artifact
        run: |
          mkdir -p build_output
          # Use rsync to copy everything except the build folder itself and unnecessary heavy folders
          rsync -ar . build_output/ --exclude build_output --exclude node_modules --exclude .git --exclude tests
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: laravel-app
          path: build_output/

  deploy:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: laravel-app
          path: .

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'TASTicketing'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Deploy to FTP (Optional Legacy)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md

      - name: Deploy to FTP (GALGATIX)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER_GALGATIX }}
          username: ${{ secrets.FTP_USERNAME_GALGATIX }}
          password: ${{ secrets.FTP_PASSWORD_GALGATIX }}
          protocol: ftp
          port: 21
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md
name: Deploy Laravel to Azure App Service

on:
  push:
    branches:
      - master # Matches your "ghelpdesk" branch

jobs:
  build_and_deploy:
    name: Build package and deploy to Azure
    runs-on: ubuntu-latest # Switched to Linux for better compatibility with Azure Linux plans

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: fileinfo, mbstring, xml, gd, zip, pdo_sqlsrv, sqlsrv # Added SQL Server drivers
          ini-values: post_max_size=256M, max_execution_time=180

      - name: Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install NPM Dependencies & Build
        run: |
          if [ -f "package.json" ]; then
            npm install
            npm run build
          fi

      - name: Create Storage Link
        run: php artisan storage:link

      - name: Clear Laravel Cache
        run: |
          php artisan route:clear
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

      # This replaces your "Deploy to FTP" steps with the high-speed Azure Deploy
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'TASTicketing' # Make sure this matches your Azure App Name exactly
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .